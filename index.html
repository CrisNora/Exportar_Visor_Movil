<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Visor móvil bodega</title>
<style>
body{font-family:Arial;margin:0;background:#f2f2f2;color:#111}
header{background:#202020;color:white;padding:12px}
h1{font-size:18px;margin:0}
.wrap{padding:10px}
.dep{background:white;border:1px solid #999;border-radius:10px;margin:8px;padding:12px;font-weight:bold}
.error{background:#ffe0e0;border:1px solid red;padding:12px;border-radius:10px}
</style>
</head>
<body>

<header>
<h1>Visor móvil bodega</h1>
</header>

<div class="wrap" id="app">Cargando datos...</div>

<script>
async function iniciar(){
    const app=document.getElementById("app");
    try{
        const r=await fetch("datos.json?nocache="+Date.now());
        const data=await r.json();

        if(!data.deps || data.deps.length===0){
            app.innerHTML="<div class='error'>datos.json no tiene depósitos</div>";
            return;
        }

        app.innerHTML=data.deps.map(d=>
            "<div class='dep'>"+d.dep+"<br>Volumen: "+d.vol+" L</div>"
        ).join("");

    }catch(e){
        app.innerHTML="<div class='error'>No se pudo cargar datos.json<br>"+e+"</div>";
    }
}
iniciar();
</script>

</body>
</html>﻿
