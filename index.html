let mapaActual=0;
function fmt(n){return Math.round(Number(n||0)).toLocaleString('es-ES');}
function colorDep(d){if(!d||Number(d.volumen||0)<=0)return '#f5f5f5';if(d.color==='TINTO')return '#dc0000';if(d.color==='BLANCO')return '#ffe650';if(d.color==='ROSADO')return '#f4aac8';return '#aaa';}
function textColor(d){return d&&d.color==='TINTO'&&Number(d.volumen||0)>0?'white':'black';}
function esc(x){return String(x||'').replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}
function normDep(x){let m=String(x||'').toUpperCase().match(/([AFMITEB])[-_ ]*0*([0-9]{1,2})/);return m?m[1]+String(Number(m[2])):'';}
function campo(txt,nombre){let r=new RegExp(nombre+'[=:]\\\\s*([AFMITEB][- _]*0*[0-9]{1,2})','i');let m=String(txt||'').match(r);return m?normDep(m[1]):'';}
function origen(x){return normDep(x.origen)||campo(x.detalle,'Dep_Origen')||campo(x.detalle,'Deposito_Origen')||campo(x.detalle,'Origen')||campo(x.detalle,'PADRE');}
function destino(x){return normDep(x.destino)||campo(x.detalle,'Dep_Destino')||campo(x.detalle,'Deposito_Destino')||campo(x.detalle,'Destino')||campo(x.detalle,'ACTUAL');}
function depFila(x){return normDep(x.dep)||campo(x.detalle,'Depósito')||campo(x.detalle,'Deposito');}
function tieneLote(x,lote){if(!lote)return true;return String(x.lote||'')===lote||String(x.detalle||'').indexOf(lote)>=0;}
function caminoPadres(dep,lote){let path=[dep];let actual=dep;let seguro=0;while(seguro<20){seguro++;let encontrado='';for(let i=0;i<MOVIMIENTOS.length;i++){let x=MOVIMIENTOS[i];let o=origen(x);let d=destino(x);if(d===actual&&o&&tieneLote(x,lote)){encontrado=o;break;}}if(!encontrado||path.indexOf(encontrado)>=0)break;path.push(encontrado);actual=encontrado;}return path;}
function filtrarPorCamino(lista,path,lote){return lista.filter(function(x){let d=depFila(x);let o=origen(x);let de=destino(x);let okDep=path.indexOf(d)>=0||path.indexOf(o)>=0||path.indexOf(de)>=0;return okDep&&tieneLote(x,lote);});}
function detalleBonito(t){return esc(t).replace(/\s*\|\s*/g,'<br>').replace(/=/g,': ');}
function pintarLista(lista,clase){if(!lista||lista.length===0)return '<div class="vacio">Sin datos</div>';return lista.map(function(x){let f=x.fecha?'<div><b>'+esc(x.fecha)+'</b></div>':'';return '<div class="item '+clase+'">'+f+detalleBonito(x.detalle||'')+'</div>';}).join('');}
function bloque(titulo,contenido){return '<details class="box"><summary>'+titulo+'</summary>'+contenido+'</details>';}
function grupoDep(dep,contenido){return '<details class="grupo"><summary>'+dep+'</summary>'+contenido+'</details>';}
function porDeposito(lista,path,clase){let html='';path.forEach(function(d){let sub=lista.filter(function(x){return depFila(x)===d||origen(x)===d||destino(x)===d;});if(sub.length>0)html+=grupoDep(d,pintarLista(sub,clase));});return html||'<div class="vacio">Sin datos</div>';}
function renderTabs(){let t=document.getElementById('tabs');t.innerHTML='';for(let i=0;i<MAPAS.length;i++){let b=document.createElement('button');b.textContent=MAPAS[i].nombre;b.className=i===mapaActual?'active':'';b.onclick=function(){mapaActual=i;render();};t.appendChild(b);}}
function render(){
renderTabs();
let c=document.getElementById('canvas');
c.innerHTML='';
if(!MAPAS.length){document.getElementById('info').innerHTML='No hay mapas cargados.';return;}
let maxX=1200,maxY=600;
MAPAS[mapaActual].deps.forEach(function(p){
maxX=Math.max(maxX,p.x+p.w+80);
maxY=Math.max(maxY,p.y+p.h+80);
let d=DEPOSITOS[p.dep]||{dep:p.dep,volumen:0,capacidad:0,tipo:'',estado:'',lote:'',fecha:'',color:'VACIO'};
let e=document.createElement('div');
e.className='dep';
e.style.left=p.x+'px';
e.style.top=p.y+'px';
e.style.width=p.w+'px';
e.style.height=p.h+'px';
e.style.background=colorDep(d);
e.style.color=textColor(d);
let ratio=d.capacidad>0?Math.max(0,Math.min(1,d.volumen/d.capacidad)):0;
e.innerHTML='<div class="bar"><div class="fill" style="height:'+(ratio*100)+'%;background:'+colorDep(d)+'"></div></div><div>'+p.label+'<br>'+fmt(d.volumen)+' / '+fmt(d.capacidad)+' L<br>'+(Number(d.volumen||0)>0?(d.tipo||'SIN CLASIFICAR'):'VACIO')+(d.estado?'<br>'+d.estado:'')+'</div>';
e.onclick=function(){showDep(p.dep,d);};
c.appendChild(e);
});
c.style.width=maxX+'px';
c.style.height=maxY+'px';
}
function showDep(dep,d){let ok=Number(d.volumen||0)>0?'ok':'warn';let path=caminoPadres(dep,d.lote);let movs=filtrarPorCamino(MOVIMIENTOS,path,d.lote);let adis=filtrarPorCamino(ADICIONES,path,d.lote);let anas=filtrarPorCamino(ANALITICAS,path,d.lote);let html='<div class="title">'+esc(dep)+'</div>';html+='<div class="ficha"><b>Fecha:</b> '+esc(d.fecha||'-')+'<br><b>Volumen:</b> <span class="'+ok+'">'+fmt(d.volumen)+' L</span><br><b>Capacidad:</b> '+fmt(d.capacidad)+' L<br><b>Tipo:</b> '+esc(d.tipo||'-')+'<br><b>Estado:</b> '+esc(d.estado||'-')+'<br><b>Lote actual:</b> '+esc(d.lote||'-')+'</div>';html+=bloque('Árbol de trazabilidad por padres',porDeposito(movs.concat(adis).concat(anas),path,'mov'));html+=bloque('Analíticas',porDeposito(anas,path,'ana'));html+=bloque('Adiciones',porDeposito(adis,path,'adi'));html+=bloque('Movimientos / trasiegos',porDeposito(movs,path,'mov'));document.getElementById('info').innerHTML=html;}
render();
</script></body></html>
