<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Visor móvil bodega</title>
<style>
body{font-family:Arial,sans-serif;margin:0;background:#f2f2f2;color:#111}
header{background:#202020;color:white;padding:12px}
h1{font-size:18px;margin:0}.sub{font-size:12px;margin-top:4px}
.tabs{display:flex;gap:6px;overflow:auto;padding:8px;background:#ddd}
.tabs button{border:1px solid #999;background:white;border-radius:8px;padding:8px 12px;font-weight:bold}
.tabs button.active{background:#202020;color:white}
.wrap{padding:8px}
.map{position:relative;background:#eee;border:1px solid #aaa;border-radius:10px;overflow:auto;height:58vh}
.canvas{position:relative;width:1700px;height:760px}
.dep{position:absolute;border:1.5px solid #333;border-radius:10px;text-align:center;font-weight:bold;font-size:11px;overflow:hidden;box-shadow:0 1px 3px #888;display:flex;align-items:center;justify-content:center;padding-left:18px;cursor:pointer}
.bar{position:absolute;left:4px;top:5px;width:11px;bottom:5px;background:white;border:1px solid #555}
.fill{position:absolute;left:1px;right:1px;bottom:1px}
.panel{background:white;margin-top:10px;border-radius:10px;padding:12px;border:1px solid #ccc}
.title{font-weight:bold;font-size:20px;margin-bottom:8px}
.ok{color:#0b6b0b}.warn{color:#9b0000}
.ficha{line-height:1.45;font-size:15px}
.box{border:1px solid #ddd;border-radius:8px;margin-top:8px;background:#f7f7f7}
.box summary{font-size:15px;font-weight:bold;padding:10px;background:#e9e9e9;border-radius:8px;cursor:pointer}
.item{background:white;border-left:5px solid #bbb;margin:8px;padding:8px;border-radius:6px;font-size:14px;line-height:1.35}
.mov{border-left-color:#2d7dd2}
.adi{border-left-color:#8a2be2}
.ana{border-left-color:#008060}
.hig{border-left-color:#78481e}
.vacio{padding:10px;color:#777}
.error{background:#ffe0e0;border:1px solid red;padding:12px;border-radius:10px}
</style>
</head>
<body>

<header>
<h1>Visor móvil bodega</h1>
<div class="sub">Consulta generada desde Excel</div>
</header>

<div class="tabs" id="tabs"></div>

<div class="wrap">
  <div class="map">
    <div class="canvas" id="canvas"></div>
  </div>
  <div class="panel" id="info">Cargando datos...</div>
</div>

<script>
let DEPOSITOS = {};
let MAPAS = [];
let MOVIMIENTOS = [];
let ADICIONES = [];
let ANALITICAS = [];
let HIGIENE_DEPOSITOS = {};
let LIMPIEZAS_DEPOSITOS = [];
let mapaActual = 0;

function fmt(n){
  return Math.round(Number(n || 0)).toLocaleString('es-ES');
}

function colorDep(d){
  if(!d || Number(d.volumen || 0) <= 0) return '#f5f5f5';
  if(d.color === 'TINTO') return '#dc0000';
  if(d.color === 'BLANCO') return '#ffe650';
  if(d.color === 'ROSADO') return '#f4aac8';
  return '#aaa';
}

function normalizarTexto(x){
  let t = String(x || '').toUpperCase();
  t = t.replace(/Á/g,'A').replace(/É/g,'E').replace(/Í/g,'I').replace(/Ó/g,'O').replace(/Ú/g,'U');
  return t;
}

function colorHigiene(h){
  let t = normalizarTexto((h && (h.texto || h.estado)) || '');

  if(t.includes('SOSA')) return '#7030a0';
  if(t.includes('SOLO TINTO')) return '#78481e';
  if(t.includes('DESINF')) return '#1f4e79';
  if(t.includes('REVISAR')) return '#808080';
  if(t.includes('APTO')) return '#000000';

  return '#000000';
}

function textoHigiene(h){
  if(!h) return '';

  if(h.texto){
    return String(h.texto);
  }

  let e = normalizarTexto(h.estado || '');

  if(e.includes('SOSA')) return 'SOSA';
  if(e.includes('SOLO TINTO')) return 'SOLO TINTO';
  if(e.includes('DESINF')) return 'DESINF.';
  if(e.includes('REVISAR')) return 'REVISAR';
  if(e.includes('APTO')) return 'APTO';

  return '';
}

function higieneDep(dep,d){
  let buscado = String(dep || '').toUpperCase();

  if(HIGIENE_DEPOSITOS[dep]){
    return HIGIENE_DEPOSITOS[dep];
  }

  if(HIGIENE_DEPOSITOS[buscado]){
    return HIGIENE_DEPOSITOS[buscado];
  }

  for(let k in HIGIENE_DEPOSITOS){
    if(Object.prototype.hasOwnProperty.call(HIGIENE_DEPOSITOS,k)){
      if(String(k || '').toUpperCase() === buscado){
        return HIGIENE_DEPOSITOS[k];
      }
    }
  }

  if(d && d.higiene){
    return d.higiene;
  }

  return null;
}

function textColor(d,h){
  if(d && d.color === 'TINTO' && Number(d.volumen || 0) > 0){
    return 'white';
  }

  if(Number((d && d.volumen) || 0) <= 0 && h){
    return colorHigiene(h);
  }

  return 'black';
}

function esc(x){
  return String(x || '').replace(/[&<>]/g,function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];
  });
}

function detalleBonito(t){
  return esc(t).replace(/\s*\|\s*/g,'<br>').replace(/=/g,': ');
}

function bloque(titulo,contenido){
  return '<details class="box"><summary>'+titulo+'</summary>'+contenido+'</details>';
}

function valorFecha(f){
  let s = String(f || '').trim();

  if(!s) return 0;

  let m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(m){
    return new Date(Number(m[3]), Number(m[2]) - 1, Number(m[1])).getTime();
  }

  m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if(m){
    return new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3])).getTime();
  }

  let t = Date.parse(s);
  return isNaN(t) ? 0 : t;
}

function ordenarFechaDesc(lista){
  return (lista || []).slice().sort(function(a,b){
    return valorFecha(b.fecha) - valorFecha(a.fecha);
  });
}

function pintarLista(lista,clase){
  let salida = ordenarFechaDesc(lista);

  if(!salida || salida.length === 0){
    return '<div class="vacio">Sin datos</div>';
  }

  return salida.map(function(x){
    let f = x.fecha ? '<b>'+esc(x.fecha)+'</b><br>' : '';
    return '<div class="item '+clase+'">'+f+detalleBonito(x.detalle || '')+'</div>';
  }).join('');
}

function campo(x,nombres){
  if(!x) return '';

  for(let i=0;i<nombres.length;i++){
    let n = nombres[i];

    if(x[n] !== undefined && x[n] !== null && String(x[n]).trim() !== ''){
      return String(x[n]).trim();
    }
  }

  let buscados = nombres.map(function(n){
    return normalizarTexto(n).replace(/_/g,'');
  });

  for(let k in x){
    if(Object.prototype.hasOwnProperty.call(x,k)){
      let nk = normalizarTexto(k).replace(/_/g,'');

      if(buscados.includes(nk)){
        if(x[k] !== undefined && x[k] !== null && String(x[k]).trim() !== ''){
          return String(x[k]).trim();
        }
      }
    }
  }

  return '';
}

function campoDetalle(x,nombres){
  let detalle = String((x && x.detalle) || '');

  if(!detalle) return '';

  for(let i=0;i<nombres.length;i++){
    let n = nombres[i];

    let patrones = [
      n,
      n.replace(/_/g,' '),
      n.replace(/ /g,'_')
    ];

    for(let j=0;j<patrones.length;j++){
      let p = patrones[j].replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
      let re = new RegExp(p + '\\s*[:=]\\s*([^|\\n\\r]+)', 'i');
      let m = detalle.match(re);

      if(m && m[1]){
        return String(m[1]).trim();
      }
    }
  }

  return '';
}

function loteOrigenMovimiento(x,loteActual){
  let directo = campo(x,[
    'lote_origen_momento',
    'Lote_Origen_Momento',
    'lote_origen',
    'Lote_Origen',
    'lote_anterior',
    'Lote_Anterior'
  ]);

  if(directo) return directo;

  let desdeDetalle = campoDetalle(x,[
    'Lote_Origen_Momento',
    'Lote Origen Momento',
    'Lote_Origen',
    'Lote Origen',
    'Lote_Anterior',
    'Lote Anterior'
  ]);

  if(desdeDetalle) return desdeDetalle;

  let lote = campo(x,['lote','Lote']);

  if(lote && lote !== loteActual){
    return lote;
  }

  return loteActual;
}

function renderTabs(){
  let t = document.getElementById('tabs');
  t.innerHTML = '';

  MAPAS.forEach(function(m,i){
    let b = document.createElement('button');
    b.textContent = m.nombre;
    b.className = i === mapaActual ? 'active' : '';
    b.onclick = function(){
      mapaActual = i;
      render();
    };
    t.appendChild(b);
  });
}

function render(){
  renderTabs();

  let c = document.getElementById('canvas');
  c.innerHTML = '';

  if(!MAPAS || MAPAS.length === 0){
    document.getElementById('info').innerHTML = '<div class="error">No hay mapas cargados en datos.json.</div>';
    return;
  }

  let maxX = 1200;
  let maxY = 600;

  MAPAS[mapaActual].deps.forEach(function(p){
    maxX = Math.max(maxX, Number(p.x) + Number(p.w) + 80);
    maxY = Math.max(maxY, Number(p.y) + Number(p.h) + 80);

    let d = DEPOSITOS[p.dep] || {
      dep:p.dep,
      volumen:0,
      capacidad:0,
      tipo:'',
      estado:'',
      lote:'',
      fecha:'',
      color:'VACIO'
    };

    let h = higieneDep(p.dep,d);

    let e = document.createElement('div');
    e.className = 'dep';
    e.style.left = p.x + 'px';
    e.style.top = p.y + 'px';
    e.style.width = p.w + 'px';
    e.style.height = p.h + 'px';
    e.style.background = colorDep(d);
    e.style.color = textColor(d,h);

    let ratio = d.capacidad > 0 ? Math.max(0,Math.min(1,d.volumen/d.capacidad)) : 0;

    let textoCentral = Number(d.volumen || 0) > 0
      ? esc(d.tipo || 'SIN CLASIFICAR')
      : esc(textoHigiene(h) || 'VACIO');

    let textoExtra = '';

    if(Number(d.volumen || 0) > 0 && d.estado){
      textoExtra = '<br>'+esc(d.estado);
    }

    if(Number(d.volumen || 0) <= 0 && !h && d.estado){
      textoExtra = '<br>'+esc(d.estado);
    }

    e.innerHTML =
      '<div class="bar"><div class="fill" style="height:'+(ratio*100)+'%;background:'+colorDep(d)+'"></div></div>' +
      '<div>' +
      esc(p.label || p.dep) + '<br>' +
      fmt(d.volumen) + ' / ' + fmt(d.capacidad) + ' L<br>' +
      textoCentral +
      textoExtra +
      '</div>';

    e.onclick = function(){
      showDep(p.dep,d);
    };

    c.appendChild(e);
  });

  c.style.width = maxX + 'px';
  c.style.height = maxY + 'px';
}

function perteneceLote(x,lote){
  if(!lote) return false;

  let valores = [
    campo(x,['lote','Lote']),
    campo(x,['lote_resultante','Lote_Resultante']),
    campo(x,['lote_origen','Lote_Origen']),
    campo(x,['lote_origen_momento','Lote_Origen_Momento']),
    campoDetalle(x,['Lote_Resultante','Lote_Origen','Lote_Origen_Momento'])
  ];

  if(valores.some(function(v){ return String(v || '') === String(lote || ''); })){
    return true;
  }

  return String(x.detalle || '').includes(lote);
}

function normalizarDep(x){
  let t = String(x || '').trim().toUpperCase();

  t = t.replace(/^ACTUAL\s*:\s*/i,'');
  t = t.replace(/^ORIGEN\s*:\s*/i,'');
  t = t.replace(/^DESTINO\s*:\s*/i,'');
  t = t.replace(/^DEP[ÓO]SITO\s*:\s*/i,'');
  t = t.replace(/^DEPOSITO\s*:\s*/i,'');

  return t.trim();
}

function depositoMovimiento(x){
  let valores = [
    campo(x,['dep','Dep','deposito','Deposito','depósito','Depósito']),
    campo(x,['origen','Origen']),
    campo(x,['destino','Destino']),
    campoDetalle(x,['Depósito','Deposito','Dep','Actual','Origen','Destino'])
  ];

  for(let i = 0; i < valores.length; i++){
    if(String(valores[i] || '').trim() !== ''){
      return normalizarDep(valores[i]);
    }
  }

  return '';
}

function origenMovimiento(x){
  return normalizarDep(
    campo(x,['origen','Origen']) ||
    campoDetalle(x,['Origen'])
  );
}

function destinoMovimiento(x){
  return normalizarDep(
    campo(x,['destino','Destino']) ||
    campoDetalle(x,['Destino'])
  );
}

function tipoMovimientoVisor(x){
  let valores = [
    campo(x,['evento','Evento']),
    campo(x,['tipo','Tipo']),
    campo(x,['tipo_movimiento','Tipo_Movimiento']),
    campo(x,['movimiento','Movimiento']),
    campo(x,['operacion','Operacion','operación','Operación']),
    campo(x,['accion','Accion','acción','Acción']),
    campoDetalle(x,['Evento','Tipo','Tipo_Movimiento','Movimiento','Operacion','Operación','Accion','Acción']),
    x && x.detalle ? x.detalle : ''
  ];

  return normalizarTexto(valores.join(' '));
}

function litrosMovimiento(x){
  let v =
    campo(x,['litros','Litros','volumen','Volumen','cantidad','Cantidad']) ||
    campoDetalle(x,['Litros','Volumen','Cantidad']);

  v = String(v || '0')
    .replace(/\./g,'')
    .replace(',','.');

  let n = Number(v);

  return isNaN(n) ? 0 : n;
}

function esSalidaMovimiento(x){
  let t = tipoMovimientoVisor(x);

  if(t.includes('SALIDA_CLIENTE')) return true;
  if(t.includes('SALIDA CLIENTE')) return true;
  if(t.includes('CLIENTE')) return true;
  if(t.includes('EMBOTELLADO')) return true;
  if(t.includes('ENVIO')) return true;
  if(t.includes('ENVÍO')) return true;
  if(t.includes('CARGA')) return true;
  if(t.includes('SALIDA')) return true;

  if(t.includes('MERMA')){
    return litrosMovimiento(x) < 0;
  }

  return false;
}

function esEntradaMovimiento(x){
  let t = tipoMovimientoVisor(x);

  if(t.includes('ENTRADA')) return true;
  if(t.includes('RECEPCION')) return true;
  if(t.includes('RECEPCIÓN')) return true;
  if(t.includes('RECEPCION_BODEGA')) return true;
  if(t.includes('RECEPCIÓN_BODEGA')) return true;

  if(t.includes('MERMA')){
    return litrosMovimiento(x) > 0;
  }

  return false;
}

function movimientoPerteneceADeposito(x,dep){
  let depBuscado = normalizarDep(dep);

  let posibles = [
    depositoMovimiento(x),
    origenMovimiento(x),
    destinoMovimiento(x),
    normalizarDep(campo(x,['dep','Dep'])),
    normalizarDep(campo(x,['deposito','Deposito','depósito','Depósito'])),
    normalizarDep(campoDetalle(x,['Depósito','Deposito','Actual','Origen','Destino']))
  ];

  return posibles.some(function(v){
    return v && v === depBuscado;
  });
}

function eventosNodo(dep,lote){
  let depBuscado = normalizarDep(dep);

  let entradas = MOVIMIENTOS.filter(function(x){
    if(!perteneceLote(x,lote)) return false;

    let destino = destinoMovimiento(x);

    if(destino && destino === depBuscado) return true;

    return movimientoPerteneceADeposito(x,depBuscado) && esEntradaMovimiento(x);
  });

  let salidas = MOVIMIENTOS.filter(function(x){
    if(!perteneceLote(x,lote)) return false;

    let origen = origenMovimiento(x);

    if(origen && origen === depBuscado) return true;

    return movimientoPerteneceADeposito(x,depBuscado) && esSalidaMovimiento(x);
  });

  let adis = ADICIONES.filter(function(x){
    return normalizarDep(x.dep) === depBuscado && perteneceLote(x,lote);
  });

  let anas = ANALITICAS.filter(function(x){
    return normalizarDep(x.dep) === depBuscado && perteneceLote(x,lote);
  });

  return {
    entradas: entradas,
    salidas: salidas,
    adis: adis,
    anas: anas
  };
}

function textoMovimiento(x){
  let partes = [];

  ['tipo','tipo_movimiento','movimiento','operacion','accion','detalle'].forEach(function(k){
    if(x && x[k]) partes.push(String(x[k]));
  });

  return partes.join(' ').toLowerCase();
}

function esMezcla(x){
  let t = textoMovimiento(x);
  return t.includes('mezcla') || t.includes('mix');
}

function claveAnalitica(x){
  return String(x.dep || '') + '|' +
         String(x.fecha || '') + '|' +
         String(x.lote || '') + '|' +
         String(x.detalle || '');
}

function ultimaAnaliticaDeDeposito(dep,lote){
  let depBuscado = String(dep || '').trim();

  if(!depBuscado) return null;

  let listaMismoLote = ANALITICAS.filter(function(a){
    return String(a.dep || '').trim() === depBuscado && perteneceLote(a,lote);
  });

  let encontrada = ordenarFechaDesc(listaMismoLote)[0] || null;

  if(encontrada){
    return encontrada;
  }

  let listaSoloDeposito = ANALITICAS.filter(function(a){
    return String(a.dep || '').trim() === depBuscado;
  });

  return ordenarFechaDesc(listaSoloDeposito)[0] || null;
}

function analiticasConDepositoAnterior(dep,lote,ev){
  let anas = (ev.anas || []).slice();
  let yaIncluidas = {};

  anas.forEach(function(a){
    yaIncluidas[claveAnalitica(a)] = true;
  });

  (ev.entradas || []).forEach(function(m){
    let origen = String(m.origen || '').trim();

    if(!origen) return;
    if(origen === String(dep || '').trim()) return;

    let loteAnterior = loteOrigenMovimiento(m,lote);

    let anaAnterior =
      ultimaAnaliticaDeDeposito(origen,loteAnterior) ||
      ultimaAnaliticaDeDeposito(origen,lote) ||
      ultimaAnaliticaDeDeposito(origen,'');

    if(!anaAnterior) return;

    let claveOriginal = claveAnalitica(anaAnterior);

    if(yaIncluidas[claveOriginal]) return;

    let copia = {};

    for(let k in anaAnterior){
      if(Object.prototype.hasOwnProperty.call(anaAnterior,k)){
        copia[k] = anaAnterior[k];
      }
    }

    copia.detalle =
      'ANALÍTICA HEREDADA DEL DEPÓSITO ANTERIOR: ' + origen +
      ' | Lote origen: ' + loteAnterior +
      ' | ' +
      (anaAnterior.detalle || '');

    copia.es_heredada = true;

    yaIncluidas[claveOriginal] = true;
    anas.push(copia);
  });

  return anas;
}

function construirArbol(dep,lote,nivel,visitados){
  let clave = dep + '|' + lote;

  if(visitados[clave]){
    return '<div class="item mov">↳ '+esc(dep)+' / '+esc(lote)+' ya visitado</div>';
  }

  visitados[clave] = true;

  let ev = eventosNodo(dep,lote);
  let anasVisor = analiticasConDepositoAnterior(dep,lote,ev);

  let abierto = nivel === 0 ? ' open' : '';

  let html = '<details class="box"' + abierto + '>' +
    '<summary>'+('&nbsp;&nbsp;'.repeat(nivel))+'DEPÓSITO '+esc(dep)+' | Lote '+esc(lote || '-')+'</summary>';

  html += bloque('Entradas', pintarLista(ev.entradas,'mov'));
  html += bloque('Salidas', pintarLista(ev.salidas,'mov'));
  html += bloque('Adiciones', pintarLista(ev.adis,'adi'));
  html += bloque('Analíticas', pintarLista(anasVisor,'ana'));

  let padres = ev.entradas
    .filter(x => x.origen && x.origen !== dep)
    .map(x => ({
      dep:x.origen,
      lote:loteOrigenMovimiento(x,lote)
    }));

  let unicos = {};
  padres.forEach(p => unicos[p.dep + '|' + p.lote] = p);

  let listaPadres = Object.values(unicos);

  if(listaPadres.length > 0){
    html += '<details class="box"><summary>Padres anteriores</summary>';

    listaPadres.forEach(p => {
      html += construirArbol(p.dep,p.lote,nivel+1,visitados);
    });

    html += '</details>';
  }

  html += '</details>';

  return html;
}

function fichaHigiene(dep,d){
  let h = higieneDep(dep,d);

  if(!h){
    return '<div class="ficha"><b>Limpieza / aptitud:</b> Sin datos</div>';
  }

  let html = '<div class="ficha">' +
    '<b>Limpieza / aptitud:</b> '+esc(h.estado || h.texto || '-')+'<br>' +
    '<b>Fecha:</b> '+esc(h.fecha || '-')+'<br>' +
    '<b>Necesita sosa:</b> '+esc(h.necesita_sosa || '-')+'<br>' +
    '<b>Necesita desinfección:</b> '+esc(h.necesita_desinfeccion || '-')+'<br>' +
    '<b>Apto tinto:</b> '+esc(h.apto_tinto || '-')+'<br>' +
    '<b>Apto blanco/rosado:</b> '+esc(h.apto_blanco_rosado || '-')+'<br>' +
    '<b>Tipo limpieza:</b> '+esc(h.tipo_limpieza || '-')+'<br>' +
    '<b>Realizado por:</b> '+esc(h.realizado_por || '-')+'<br>' +
    '<b>Incidencia:</b> '+esc(h.incidencia || '-')+'<br>' +
    '<b>Observaciones:</b> '+esc(h.observaciones || '-')+
    '</div>';

  let hist = LIMPIEZAS_DEPOSITOS.filter(function(x){
    return String(x.dep || '').toUpperCase() === String(dep || '').toUpperCase();
  });

  html += bloque('Histórico limpieza / aptitud', pintarLista(hist,'hig'));

  return html;
}

function showDep(dep,d){
  let ok = Number(d.volumen || 0) > 0 ? 'ok' : 'warn';
  let lote = d.lote || '';

  let html = '<div class="title">'+esc(dep)+'</div>';

  html += '<div class="ficha">' +
    '<b>Fecha:</b> '+esc(d.fecha || '-')+'<br>' +
    '<b>Volumen:</b> <span class="'+ok+'">'+fmt(d.volumen)+' L</span><br>' +
    '<b>Capacidad:</b> '+fmt(d.capacidad)+' L<br>' +
    '<b>Tipo:</b> '+esc(d.tipo || '-')+'<br>' +
    '<b>Estado:</b> '+esc(d.estado || '-')+'<br>' +
    '<b>Lote actual:</b> '+esc(lote || '-')+
    '</div>';

  if(Number(d.volumen || 0) <= 0){
    html += bloque('Limpieza / aptitud del depósito', fichaHigiene(dep,d));
  }

  html += construirArbol(dep,lote,0,{});

  document.getElementById('info').innerHTML = html;
}

fetch('datos.json?nocache=' + Date.now())
.then(function(r){
  return r.text();
})
.then(function(txt){
  if(txt.trim().startsWith('<')){
    throw new Error('datos.json contiene HTML, no datos JSON.');
  }

  let data = JSON.parse(txt);

  DEPOSITOS = data.depositos || {};
  MAPAS = data.mapas || [];
  MOVIMIENTOS = data.movimientos || [];
  ADICIONES = data.adiciones || [];
  ANALITICAS = data.analiticas || [];
  HIGIENE_DEPOSITOS = data.higiene_depositos || {};
  LIMPIEZAS_DEPOSITOS = data.limpiezas_depositos || [];

  render();
  document.getElementById('info').innerHTML = 'Pulsa un depósito.';
})
.catch(function(e){
  document.getElementById('info').innerHTML =
    '<div class="error">No se pudo cargar datos.json<br>' + esc(e.message || e) + '</div>';
});
</script>

</body>
</html>
