<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Visor móvil bodega</title>
<style>
body{font-family:Arial,sans-serif;margin:0;background:#f2f2f2;color:#111}
header{background:#202020;color:white;padding:12px}
h1{font-size:18px;margin:0}.sub{font-size:12px;margin-top:4px}
.tabs{display:flex;gap:6px;overflow:auto;padding:8px;background:#ddd}
.tabs button{border:1px solid #999;background:white;border-radius:8px;padding:8px 12px;font-weight:bold}
.tabs button.active{background:#202020;color:white}
.wrap{padding:8px}
.map{position:relative;background:#eee;border:1px solid #aaa;border-radius:10px;overflow:auto;height:58vh}
.canvas{position:relative;width:1700px;height:760px}
.dep{position:absolute;border:1.5px solid #333;border-radius:10px;text-align:center;font-weight:bold;font-size:11px;overflow:hidden;box-shadow:0 1px 3px #888;display:flex;align-items:center;justify-content:center;padding-left:18px;cursor:pointer}
.bar{position:absolute;left:4px;top:5px;width:11px;bottom:5px;background:white;border:1px solid #555}
.fill{position:absolute;left:1px;right:1px;bottom:1px}
.panel{background:white;margin-top:10px;border-radius:10px;padding:12px;border:1px solid #ccc}
.title{font-weight:bold;font-size:20px;margin-bottom:8px}
.ok{color:#0b6b0b}.warn{color:#9b0000}
.ficha{line-height:1.45;font-size:15px}
.box{border:1px solid #ddd;border-radius:8px;margin-top:8px;background:#f7f7f7}
.box summary{font-size:15px;font-weight:bold;padding:10px;background:#e9e9e9;border-radius:8px;cursor:pointer}
.item{background:white;border-left:5px solid #bbb;margin:8px;padding:8px;border-radius:6px;font-size:14px;line-height:1.35}
.mov{border-left-color:#2d7dd2}
.adi{border-left-color:#8a2be2}
.ana{border-left-color:#008060}
.vacio{padding:10px;color:#777}
.error{background:#ffe0e0;border:1px solid red;padding:12px;border-radius:10px}
</style>
</head>
<body>

<header>
<h1>Visor móvil bodega</h1>
<div class="sub">Consulta generada desde Excel</div>
</header>

<div class="tabs" id="tabs"></div>

<div class="wrap">
  <div class="map">
    <div class="canvas" id="canvas"></div>
  </div>
  <div class="panel" id="info">Cargando datos...</div>
</div>

<script>
let DEPOSITOS = {};
let MAPAS = [];
let MOVIMIENTOS = [];
let ADICIONES = [];
let ANALITICAS = [];
let mapaActual = 0;

function fmt(n){
  return Math.round(Number(n || 0)).toLocaleString('es-ES');
}

function colorDep(d){
  if(!d || Number(d.volumen || 0) <= 0) return '#f5f5f5';
  if(d.color === 'TINTO') return '#dc0000';
  if(d.color === 'BLANCO') return '#ffe650';
  if(d.color === 'ROSADO') return '#f4aac8';
  return '#aaa';
}

function textColor(d){
  return d && d.color === 'TINTO' && Number(d.volumen || 0) > 0 ? 'white' : 'black';
}

function esc(x){
  return String(x || '').replace(/[&<>]/g,function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];
  });
}

function detalleBonito(t){
  return esc(t).replace(/\s*\|\s*/g,'<br>').replace(/=/g,': ');
}

function bloque(titulo,contenido){
  return '<details class="box"><summary>'+titulo+'</summary>'+contenido+'</details>';
}

function pintarLista(lista,clase){
  if(!lista || lista.length === 0){
    return '<div class="vacio">Sin datos</div>';
  }

  return lista.map(function(x){
    let f = x.fecha ? '<b>'+esc(x.fecha)+'</b><br>' : '';
    return '<div class="item '+clase+'">'+f+detalleBonito(x.detalle || '')+'</div>';
  }).join('');
}

function filtrar(lista,dep,lote){
  return lista.filter(function(x){
    return x.dep === dep ||
           x.origen === dep ||
           x.destino === dep;
  });
}

function renderTabs(){
  let t = document.getElementById('tabs');
  t.innerHTML = '';

  MAPAS.forEach(function(m,i){
    let b = document.createElement('button');
    b.textContent = m.nombre;
    b.className = i === mapaActual ? 'active' : '';
    b.onclick = function(){
      mapaActual = i;
      render();
    };
    t.appendChild(b);
  });
}

function render(){
  renderTabs();

  let c = document.getElementById('canvas');
  c.innerHTML = '';

  if(!MAPAS || MAPAS.length === 0){
    document.getElementById('info').innerHTML = '<div class="error">No hay mapas cargados en datos.json.</div>';
    return;
  }

  let maxX = 1200;
  let maxY = 600;

  MAPAS[mapaActual].deps.forEach(function(p){
    maxX = Math.max(maxX, Number(p.x) + Number(p.w) + 80);
    maxY = Math.max(maxY, Number(p.y) + Number(p.h) + 80);

    let d = DEPOSITOS[p.dep] || {
      dep:p.dep,
      volumen:0,
      capacidad:0,
      tipo:'',
      estado:'',
      lote:'',
      fecha:'',
      color:'VACIO'
    };

    let e = document.createElement('div');
    e.className = 'dep';
    e.style.left = p.x + 'px';
    e.style.top = p.y + 'px';
    e.style.width = p.w + 'px';
    e.style.height = p.h + 'px';
    e.style.background = colorDep(d);
    e.style.color = textColor(d);

    let ratio = d.capacidad > 0 ? Math.max(0,Math.min(1,d.volumen/d.capacidad)) : 0;

    e.innerHTML =
      '<div class="bar"><div class="fill" style="height:'+(ratio*100)+'%;background:'+colorDep(d)+'"></div></div>' +
      '<div>' +
      esc(p.label || p.dep) + '<br>' +
      fmt(d.volumen) + ' / ' + fmt(d.capacidad) + ' L<br>' +
      (Number(d.volumen || 0) > 0 ? esc(d.tipo || 'SIN CLASIFICAR') : 'VACIO') +
      (d.estado ? '<br>'+esc(d.estado) : '') +
      '</div>';

    e.onclick = function(){
      showDep(p.dep,d);
    };

    c.appendChild(e);
  });

  c.style.width = maxX + 'px';
  c.style.height = maxY + 'px';
}

function mismoLote(x,lote){
  if(!lote) return false;
  return String(x.lote || '') === lote ||
         String(x.detalle || '').includes(lote);
}

function perteneceLote(x,lote){
  if(!lote) return false;
  return String(x.lote || '') === lote ||
         String(x.lote_resultante || '') === lote ||
         String(x.lote_origen || '') === lote ||
         String(x.detalle || '').includes(lote);
}

function eventosNodo(dep,lote){
  let entradas = MOVIMIENTOS.filter(x =>
    x.destino === dep && perteneceLote(x,lote)
  );

  let salidas = MOVIMIENTOS.filter(x =>
    x.origen === dep && perteneceLote(x,lote)
  );

  let adis = ADICIONES.filter(x =>
    x.dep === dep && perteneceLote(x,lote)
  );

  let anas = ANALITICAS.filter(x =>
    x.dep === dep && perteneceLote(x,lote)
  );

  return {entradas:entradas,salidas:salidas,adis:adis,anas:anas};
}

function lotePadreDesdeMovimiento(x,loteActual){
  if(x.lote_origen) return x.lote_origen;
  if(x.lote && x.lote !== loteActual) return x.lote;
  return loteActual;
}

function construirArbol(dep,lote,nivel,visitados){
  let clave = dep + '|' + lote;

  if(visitados[clave]){
    return '<div class="item mov">↳ '+esc(dep)+' / '+esc(lote)+' ya visitado</div>';
  }

  visitados[clave] = true;

  let ev = eventosNodo(dep,lote);

  let html = '<details class="box" open>' +
    '<summary>'+('&nbsp;&nbsp;'.repeat(nivel))+'DEPÓSITO '+esc(dep)+' | Lote '+esc(lote || '-')+'</summary>';

  html += bloque('Entradas', pintarLista(ev.entradas,'mov'));
  html += bloque('Salidas', pintarLista(ev.salidas,'mov'));
  html += bloque('Adiciones', pintarLista(ev.adis,'adi'));
  html += bloque('Analíticas', pintarLista(ev.anas,'ana'));

  let padres = ev.entradas
    .filter(x => x.origen && x.origen !== dep)
    .map(x => ({
      dep:x.origen,
      lote:lotePadreDesdeMovimiento(x,lote)
    }));

  let unicos = {};
  padres.forEach(p => unicos[p.dep + '|' + p.lote] = p);

  let listaPadres = Object.values(unicos);

  if(listaPadres.length > 0){
    html += '<details class="box" open><summary>Padres anteriores</summary>';
    listaPadres.forEach(p => {
      html += construirArbol(p.dep,p.lote,nivel+1,visitados);
    });
    html += '</details>';
  }

  html += '</details>';

  return html;
}

function showDep(dep,d){
  let ok = Number(d.volumen || 0) > 0 ? 'ok' : 'warn';
  let lote = d.lote || '';

  let html = '<div class="title">'+esc(dep)+'</div>';

  html += '<div class="ficha">' +
    '<b>Fecha:</b> '+esc(d.fecha || '-')+'<br>' +
    '<b>Volumen:</b> <span class="'+ok+'">'+fmt(d.volumen)+' L</span><br>' +
    '<b>Capacidad:</b> '+fmt(d.capacidad)+' L<br>' +
    '<b>Tipo:</b> '+esc(d.tipo || '-')+'<br>' +
    '<b>Estado:</b> '+esc(d.estado || '-')+'<br>' +
    '<b>Lote actual:</b> '+esc(lote || '-')+
    '</div>';

  html += construirArbol(dep,lote,0,{});

  document.getElementById('info').innerHTML = html;
}
fetch('datos.json?nocache=' + Date.now())
.then(function(r){
  return r.text();
})
.then(function(txt){
  if(txt.trim().startsWith('<')){
    throw new Error('datos.json contiene HTML, no datos JSON.');
  }

  let data = JSON.parse(txt);

  DEPOSITOS = data.depositos || {};
  MAPAS = data.mapas || [];
  MOVIMIENTOS = data.movimientos || [];
  ADICIONES = data.adiciones || [];
  ANALITICAS = data.analiticas || [];

  render();
  document.getElementById('info').innerHTML = 'Pulsa un depósito.';
})
.catch(function(e){
  document.getElementById('info').innerHTML =
    '<div class="error">No se pudo cargar datos.json<br>' + esc(e.message || e) + '</div>';
});
</script>

</body>
</html>
